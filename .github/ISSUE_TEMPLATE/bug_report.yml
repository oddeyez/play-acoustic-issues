name: Bug report
description: Something in the editor isn't working — wrong value, wrong UI, connection problem, etc.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. The more concrete you can be about what you did, what you saw, and what you expected, the faster the fix.

  - type: dropdown
    id: device
    attributes:
      label: Device
      description: Which TC Helicon device are you using with the editor?
      options:
        - Play Acoustic
        - Play Electric
        - Other / not sure
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Device firmware version
      description: Shown in the editor's firmware banner once it's connected, or on the device LCD (Setup → System).
      placeholder: e.g. 1.4.00 Build 51 (PA) or 1.3.00 Build 34 (PE)
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      description: Web MIDI behavior varies a lot across browsers and OSes — this helps narrow down platform-specific bugs.
      placeholder: e.g. Chrome 148 on Windows 11, or Safari 17 on macOS 14
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Editor URL
      description: Which deploy of the editor were you using?
      value: https://oddeyez.se/app/
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A short description of the problem. One or two sentences is usually enough.
      placeholder: e.g. "When I change Comp Style on Play Electric, the Amp Drive value also changes."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. "Only the Comp Style byte should change. Amp Drive should stay put."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Number the steps if you can — it's much easier to triage.
      placeholder: |
        1. Connect Play Electric, wait for green firmware banner
        2. Click Load → From device
        3. Switch to the Setup tab
        4. Change Comp Style from Subtle Tube → Sustain Pop
        5. Observe: Amp Drive value also changed
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Screenshots, console errors, or anything else
      description: |
        Optional but helpful. Browser console errors (F12 → Console) often pinpoint the cause. Screenshots of the editor + what the device LCD shows are gold.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
